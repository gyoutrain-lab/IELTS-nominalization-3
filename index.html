<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Band 9 Precision Drill</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 700px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .label { font-weight: bold; margin-top: 15px; display: block; color: #2c3e50; }
        .dropdown { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #bdc3c7; border-radius: 6px; }
        button { background: #2c3e50; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #output { margin-top: 20px; padding: 20px; background: #ecf0f1; border-radius: 6px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Band 9 Precision Drill</h2>
    <p id="prompt"><strong>Prompt:</strong> Loading...</p>

    <label class="label">Cause Nominalization</label>
    <select id="cause" class="dropdown"><option value="">-- Select --</option></select>
    
    <label class="label">Academic Verbs</label>
    <select id="verb" class="dropdown"><option value="">-- Select --</option></select>
    
    <label class="label">Effect Nominalization</label>
    <select id="effect" class="dropdown"><option value="">-- Select --</option></select>
    
    <button onclick="render()">Submit & Evaluate</button>
    <button style="background:#27ae60; margin-top:10px;" onclick="nextCase()">Next Case &raquo;</button>
    
    <div id="output"></div>
</div>

<script>
    const data = [
        { 
            q: "More people use bikes instead of cars, so traffic goes down.",
            // Options structure: [Band 5/6, Band 7, Band 9]
            causes: ["People riding bikes", "The shift towards cycling", "The widespread adoption of bicycle commuting"],
            verbs: ["makes", "helps with", "facilitates"],
            effects: ["less traffic jams", "a reduction in congestion", "the substantial mitigation of urban traffic congestion"]
        }
    ];

    let current = 0;

    function init() {
        document.getElementById('prompt').innerHTML = `<strong>Prompt:</strong> ${data[current].q}`;
        document.getElementById('output').style.display = 'none';
        
        ['cause', 'verb', 'effect'].forEach((id, idx) => {
            let el = document.getElementById(id);
            el.innerHTML = '<option value="">-- Select --</option>' + 
                data[current][id + 's'].map((opt, i) => `<option value="${i}">${opt}</option>`).join('');
        });
    }

    function render() {
        const c = document.getElementById('cause').value;
        const v = document.getElementById('verb').value;
        const e = document.getElementById('effect').value;
        const out = document.getElementById('output');
        
        out.style.display = 'block';
        if(c === "" || v === "" || e === "") {
            out.innerHTML = "<strong>Score: N/A</strong> <br> Please select an option for every field.";
        } else {
            // Scoring: Sum of indices (2+2+2 = 6, which is "all Band 9 options")
            let scoreVal = parseInt(c) + parseInt(v) + parseInt(e);
            let band = (scoreVal === 6) ? "9.0" : (scoreVal >= 3) ? "7.5" : "6.0";
            let msg = (scoreVal === 6) ? "Perfect Academic Register!" : "Keep practicing to refine your precision.";
            
            out.innerHTML = `<strong>Estimated Band: ${band}</strong><br>${msg}<br><em>"${data[current].causes[c]} ${data[current].verbs[v]} ${data[current].effects[e]}."</em>`;
        }
    }

    function nextCase() { current = (current + 1) % data.length; init(); }
    init();
</script>
</body>
</html>
